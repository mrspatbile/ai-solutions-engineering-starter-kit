name: lint
on: [push, pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.11'
      - run: uv sync --extra development
      - run: uv run --extra development ruff check .
      - run: uv run --extra development mypy app evaluation
